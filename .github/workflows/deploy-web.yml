name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Hosting provider'
        required: true
        type: choice
        options:
          - cloudflare-workers
          # Future providers: vercel, netlify, firebase-hosting
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Git ref to checkout (branch, tag, SHA). Leave empty for current branch.'
        required: false
        type: string
        default: ''
      preview:
        description: 'Preview deploy (versioned upload, does not roll production forward)'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      provider:
        description: 'Hosting provider'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (branch, tag, SHA). Leave empty for current ref.'
        required: false
        type: string
        default: ''
      preview:
        description: 'Preview deploy (versioned upload, does not roll production forward)'
        required: false
        type: boolean
        default: false
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: 'Cloudflare API token with Workers Scripts: Edit permission'
        required: true
      # App configuration (whole-file JSON injection — see docs/template/DEPLOYMENT.md).
      # Place this secret inside the matching GitHub Environment (staging or production).
      CONFIG_FILE:
        description: 'Full JSON body of config/<env>.json for the target environment'
        required: false
    outputs:
      deployment_url:
        description: 'URL of the deployed site'
        value: ${{ jobs.web.outputs.deployment_url }}

concurrency:
  group: deploy-web-${{ inputs.environment }}
  cancel-in-progress: false

# Opt JavaScript-based actions onto Node 24 ahead of the GitHub Actions
# default flip on 2026-06-02. Safe to leave in permanently; becomes a
# no-op once Node 24 is the runtime default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Deploy Web (${{ inputs.provider }} / ${{ inputs.environment }})
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || '' }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Provision config
        run: ./scripts/setup.sh

      - name: Apply config from secret
        env:
          CONFIG_FILE: ${{ secrets.CONFIG_FILE }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          if [ -z "${CONFIG_FILE:-}" ]; then
            echo "No CONFIG_FILE secret set in the $ENV_NAME environment — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$CONFIG_FILE" | jq empty 2>/dev/null; then
            echo "::error::CONFIG_FILE secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$CONFIG_FILE" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from CONFIG_FILE secret in the $ENV_NAME environment"

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define-from-file=config/${{ inputs.environment }}.json

      # ── Cloudflare Workers (static assets) ────────────────────────────
      # Production deploys roll the live version (`wrangler deploy`).
      # Preview deploys upload a draft version that gets a unique
      # `<version>-<worker>.<subdomain>.workers.dev` URL without affecting
      # production (`wrangler versions upload`). The wrangler action
      # exposes both URLs as `deployment-url`.
      - name: Deploy to Cloudflare Workers
        id: deploy
        if: inputs.provider == 'cloudflare-workers'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            ${{ inputs.preview && 'versions upload' || 'deploy' }}
            --name=${{ vars.CLOUDFLARE_WORKER_NAME }}
