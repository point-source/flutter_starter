name: CI

# Trigger philosophy: auto on PRs (the merge gate), manual via
# workflow_dispatch for ad-hoc reruns, reusable via workflow_call so
# derived projects can wire CI into their own pipelines. Notably no
# `push: [main]` trigger -- the PR check is the merge gate, and a
# post-merge re-run on the same SHA buys nothing while colliding with
# downstream `push: [main]` automation. Projects that want direct-push
# coverage can add `push: [main]` back themselves.
# See docs/template/adrs/012-workflow-trigger-philosophy.md.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript-based actions onto Node 24 ahead of the GitHub Actions
# default flip on 2026-06-02. Safe to leave in permanently; becomes a
# no-op once Node 24 is the runtime default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze & check formatting
        run: ./scripts/ci-check.sh --check lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: ./scripts/ci-check.sh --check --coverage test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # archive: false uploads the file directly (no zip wrap).
          # The artifact name is taken from the file basename, so the
          # `name` input is intentionally omitted (it would be ignored).
          path: coverage/lcov.info
          archive: false
          retention-days: 14

  build:
    name: Build (APK debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Provision config from templates
        run: ./scripts/setup.sh

      - name: Apply config from secret
        env:
          CONFIG_DEVELOPMENT: ${{ secrets.CONFIG_DEVELOPMENT }}
          ENV_NAME: development
        run: |
          var="CONFIG_$(printf '%s' "$ENV_NAME" | tr '[:lower:]' '[:upper:]')"
          config_json="${!var:-}"
          if [ -z "$config_json" ]; then
            echo "No $var secret set — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$config_json" | jq empty 2>/dev/null; then
            echo "::error::$var secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$config_json" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from $var secret"

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define-from-file=config/development.json

  codegen-check:
    name: Code Generation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated files are up to date
        run: ./scripts/ci-check.sh --check codegen
