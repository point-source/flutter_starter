name: CI

# Trigger philosophy: auto on PRs (the merge gate), manual via
# workflow_dispatch for ad-hoc reruns, reusable via workflow_call so
# derived projects can wire CI into their own pipelines. Notably no
# `push: [main]` trigger -- the PR check is the merge gate, and a
# post-merge re-run on the same SHA buys nothing while colliding with
# downstream `push: [main]` automation. Projects that want direct-push
# coverage can add `push: [main]` back themselves.
# See docs/template/adrs/012-workflow-trigger-philosophy.md.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript-based actions onto Node 24 ahead of the GitHub Actions
# default flip on 2026-06-02. Safe to leave in permanently; becomes a
# no-op once Node 24 is the runtime default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze & check formatting
        run: ./scripts/ci-check.sh --check lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: ./scripts/ci-check.sh --check --coverage test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # archive: false uploads the file directly (no zip wrap).
          # The artifact name is taken from the file basename, so the
          # `name` input is intentionally omitted (it would be ignored).
          path: coverage/lcov.info
          archive: false
          retention-days: 14

  build:
    name: Build (APK debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Provision config from templates
        run: ./scripts/setup.sh

      - name: Apply config from secret
        env:
          CONFIG_DEVELOPMENT: ${{ secrets.CONFIG_DEVELOPMENT }}
          ENV_NAME: development
        run: |
          var="CONFIG_$(printf '%s' "$ENV_NAME" | tr '[:lower:]' '[:upper:]')"
          config_json="${!var:-}"
          if [ -z "$config_json" ]; then
            echo "No $var secret set — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$config_json" | jq empty 2>/dev/null; then
            echo "::error::$var secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$config_json" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from $var secret"

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define-from-file=config/development.json

  codegen-check:
    name: Code Generation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated files are up to date
        run: ./scripts/ci-check.sh --check codegen

  backend-migration:
    name: Backend Migration Paths
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Mason
        run: |
          dart pub global activate mason_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Exercise clean REST opt-in
        run: ./scripts/check-rest-opt-in.sh

      - name: Exercise downstream template syncs
        run: ./scripts/check-rest-adopter-migration.sh

  # Static anti-regression guard for the CocoaPods-free Apple targets.
  # Filesystem-only, so it runs on a cheap Linux runner and does NOT depend on
  # what the runner image ships: GitHub's macOS runners have CocoaPods
  # pre-installed, so a re-added Podfile could otherwise build green in the
  # Apple build jobs below and slip through. See docs SPEC §spec:ci-apple-build-guard.
  no-cocoapods:
    name: No CocoaPods Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assert no CocoaPods artifacts under ios/ or macos/
        run: ./scripts/check-no-cocoapods.sh

  # Build the iOS target on every PR so a plugin that no longer resolves under
  # SPM (or any other Apple build break) fails the merge gate. Unsigned: the
  # guard proves plugins resolve and the target compiles under SPM, not signing
  # or distribution -- that remains the release pipeline's job.
  #
  # Gated to the template repo: macOS runners are slow and costly, so derived
  # projects don't pay for the Apple builds by default. A fork that wants Apple
  # build coverage can change this condition (or delete it) for their own slug.
  # The cheap static no-cocoapods guard still runs everywhere.
  build-ios:
    name: Build (iOS, unsigned)
    runs-on: macos-latest
    if: github.repository == 'point-source/flutter_starter'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Provision config from templates
        run: ./scripts/setup.sh

      - name: Apply config from secret
        env:
          CONFIG_DEVELOPMENT: ${{ secrets.CONFIG_DEVELOPMENT }}
          ENV_NAME: development
        run: |
          var="CONFIG_$(printf '%s' "$ENV_NAME" | tr '[:lower:]' '[:upper:]')"
          config_json="${!var:-}"
          if [ -z "$config_json" ]; then
            echo "No $var secret set — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$config_json" | jq empty 2>/dev/null; then
            echo "::error::$var secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$config_json" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from $var secret"

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code signing)
        run: flutter build ios --no-codesign --dart-define-from-file=config/development.json

  # Build the macOS target on every PR. macOS is where the original no-CocoaPods
  # hard failure surfaced, so guarding it is essential; a broken macOS build
  # fails the merge gate here. Gated to the template repo for the same
  # cost reason as build-ios above.
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    if: github.repository == 'point-source/flutter_starter'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Provision config from templates
        run: ./scripts/setup.sh

      - name: Apply config from secret
        env:
          CONFIG_DEVELOPMENT: ${{ secrets.CONFIG_DEVELOPMENT }}
          ENV_NAME: development
        run: |
          var="CONFIG_$(printf '%s' "$ENV_NAME" | tr '[:lower:]' '[:upper:]')"
          config_json="${!var:-}"
          if [ -z "$config_json" ]; then
            echo "No $var secret set — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$config_json" | jq empty 2>/dev/null; then
            echo "::error::$var secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$config_json" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from $var secret"

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --dart-define-from-file=config/development.json
