name: Deploy

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to deploy'
        required: true
        type: choice
        options:
          - ios
          - android
          - both
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      lane:
        description: 'Fastlane lane (store_beta = internal testing, store_production = public store release, github = signed APK → GitHub Release; store_production requires environment=production; github requires platform=android)'
        required: true
        type: choice
        options:
          - store_beta
          - store_production
          - github
      tag_name:
        description: 'GitHub Release tag (github lane only). Leave empty for default: build-<run_number>-<environment>.'
        required: false
        type: string
        default: ''

  workflow_call:
    inputs:
      platform:
        description: 'Platform to deploy (ios, android, or both)'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      lane:
        description: 'Fastlane lane (store_beta = internal testing, store_production = public store release, github = signed APK → GitHub Release; store_production requires environment=production; github requires platform=android)'
        required: true
        type: string
      tag_name:
        description: 'GitHub Release tag (github lane only). Leave empty for default: build-<run_number>-<environment>.'
        required: false
        type: string
        default: ''
    secrets:
      # App configuration (whole-file JSON injection — see docs/template/DEPLOYMENT.md).
      # Place this secret inside the matching GitHub Environment (staging or production).
      CONFIG_FILE:
        description: 'Full JSON body of config/<env>.json for the target environment'
        required: false
      # iOS code signing and store credentials
      MATCH_PASSWORD:
        description: 'Encryption password for the match certificates repo'
        required: false
      MATCH_GIT_PRIVATE_KEY:
        description: 'SSH private key with read access to the match certificates repo'
        required: false
      MATCH_GIT_URL:
        description: 'Git URL of the match certificates repo'
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        description: 'App Store Connect API key ID'
        required: false
      APP_STORE_CONNECT_API_ISSUER_ID:
        description: 'App Store Connect API issuer ID'
        required: false
      APP_STORE_CONNECT_API_KEY:
        description: 'App Store Connect API private key (.p8 contents)'
        required: false
      # Android signing and store credentials
      ANDROID_KEYSTORE:
        description: 'Base64-encoded Android upload keystore'
        required: false
      ANDROID_KEY_PROPERTIES:
        description: 'Contents of android/key.properties'
        required: false
      GOOGLE_PLAY_JSON_KEY:
        description: 'Google Play service account JSON key contents'
        required: false

concurrency:
  group: deploy-${{ inputs.platform }}-${{ inputs.environment }}
  cancel-in-progress: false

# Opt JavaScript-based actions onto Node 24 ahead of the GitHub Actions
# default flip on 2026-06-02. Safe to leave in permanently; becomes a
# no-op once Node 24 is the runtime default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Reject invalid lane × environment combinations
        env:
          LANE: ${{ inputs.lane }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$LANE" = "store_production" ] && [ "$ENVIRONMENT" != "production" ]; then
            echo "::error::lane=store_production only supports environment=production (store_production always builds the production config and uploads to the store production track). For TestFlight / Play internal testing of the staging config, use lane=store_beta + environment=staging."
            exit 1
          fi

      - name: Reject github lane with non-Android platforms
        env:
          LANE: ${{ inputs.lane }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          if [ "$LANE" = "github" ] && [ "$PLATFORM" != "android" ]; then
            echo "::error::lane=github is Android-only (iOS has no direct-distribution analog). Use platform=android."
            exit 1
          fi

  ios:
    needs: validate
    name: Deploy iOS (${{ inputs.lane }})
    environment: ${{ inputs.environment }}
    if: (inputs.platform == 'ios' || inputs.platform == 'both') && inputs.lane != 'github'
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ios

      - name: Provision config
        working-directory: .
        run: ./scripts/setup.sh

      - name: Apply config from secret
        working-directory: .
        env:
          CONFIG_FILE: ${{ secrets.CONFIG_FILE }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          if [ -z "${CONFIG_FILE:-}" ]; then
            echo "No CONFIG_FILE secret set in the $ENV_NAME environment — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$CONFIG_FILE" | jq empty 2>/dev/null; then
            echo "::error::CONFIG_FILE secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$CONFIG_FILE" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from CONFIG_FILE secret in the $ENV_NAME environment"

      - name: Install Flutter dependencies
        working-directory: .
        run: flutter pub get

      - name: Preflight check
        env:
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
          APPLE_ID: ${{ vars.APPLE_ID }}
          TEAM_ID: ${{ vars.TEAM_ID }}
          ITC_TEAM_ID: ${{ vars.ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: bundle exec fastlane preflight environment:${{ inputs.environment }}

      - name: Deploy to ${{ inputs.environment }}
        env:
          # match
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          # App Store Connect API key
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          # App identifiers
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
          APPLE_ID: ${{ vars.APPLE_ID }}
          TEAM_ID: ${{ vars.TEAM_ID }}
          ITC_TEAM_ID: ${{ vars.ITC_TEAM_ID }}
        run: |
          bundle exec fastlane ${{ inputs.lane }} \
            environment:${{ inputs.environment }} \
            build_number:${{ github.run_number }}

  android:
    needs: validate
    name: Deploy Android (${{ inputs.lane }})
    environment: ${{ inputs.environment }}
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # contents: write is required for the github lane to create a GitHub
    # Release via `gh release create`. Scoped to this job so iOS and the
    # validate job retain the default read-only token.
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: android

      - name: Provision config
        working-directory: .
        run: ./scripts/setup.sh

      - name: Apply config from secret
        working-directory: .
        env:
          CONFIG_FILE: ${{ secrets.CONFIG_FILE }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          if [ -z "${CONFIG_FILE:-}" ]; then
            echo "No CONFIG_FILE secret set in the $ENV_NAME environment — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$CONFIG_FILE" | jq empty 2>/dev/null; then
            echo "::error::CONFIG_FILE secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$CONFIG_FILE" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from CONFIG_FILE secret in the $ENV_NAME environment"

      - name: Decode Android keystore
        run: |
          mkdir -p keystore
          echo "$ANDROID_KEYSTORE" | base64 -d > keystore/upload.jks
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}

      - name: Write key.properties
        run: echo "$ANDROID_KEY_PROPERTIES" > key.properties
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}

      - name: Write Google Play service account key
        if: inputs.lane != 'github'
        run: echo "$GOOGLE_PLAY_JSON_KEY" > fastlane/google-play-key.json
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

      - name: Install Flutter dependencies
        working-directory: .
        run: flutter pub get

      - name: Preflight check
        if: inputs.lane != 'github'
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_PLAY_JSON_KEY: ./fastlane/google-play-key.json
        run: bundle exec fastlane preflight environment:${{ inputs.environment }}

      - name: Deploy to ${{ inputs.environment }}
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_PLAY_JSON_KEY: ./fastlane/google-play-key.json
        run: |
          bundle exec fastlane ${{ inputs.lane }} \
            environment:${{ inputs.environment }} \
            build_number:${{ github.run_number }}

      - name: Create GitHub Release
        if: inputs.lane == 'github'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name != '' && inputs.tag_name || format('build-{0}-{1}', github.run_number, inputs.environment) }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK not found at $APK_PATH"
            exit 1
          fi
          prerelease_flag=""
          if [ "$ENV_NAME" != "production" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$TAG" "$APK_PATH" \
            --title "$TAG" \
            --generate-notes \
            --target "$GITHUB_SHA" \
            $prerelease_flag
          echo "Created GitHub Release: $TAG"
