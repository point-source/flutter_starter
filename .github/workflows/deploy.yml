name: Deploy

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to deploy'
        required: true
        type: choice
        options:
          - ios
          - android
          - both
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      lane:
        description: 'Fastlane lane (beta = internal testing, release = store; release requires environment=production)'
        required: true
        type: choice
        options:
          - beta
          - release

  workflow_call:
    inputs:
      platform:
        description: 'Platform to deploy (ios, android, or both)'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      lane:
        description: 'Fastlane lane (beta = internal testing, release = store; release requires environment=production)'
        required: true
        type: string
    secrets:
      # App configuration (whole-file JSON injection — see docs/template/DEPLOYMENT.md)
      CONFIG_STAGING:
        description: 'Full JSON body of config/staging.json'
        required: false
      CONFIG_PRODUCTION:
        description: 'Full JSON body of config/production.json'
        required: false
      # iOS code signing and store credentials
      MATCH_PASSWORD:
        description: 'Encryption password for the match certificates repo'
        required: false
      MATCH_GIT_PRIVATE_KEY:
        description: 'SSH private key with read access to the match certificates repo'
        required: false
      MATCH_GIT_URL:
        description: 'Git URL of the match certificates repo'
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        description: 'App Store Connect API key ID'
        required: false
      APP_STORE_CONNECT_API_ISSUER_ID:
        description: 'App Store Connect API issuer ID'
        required: false
      APP_STORE_CONNECT_API_KEY:
        description: 'App Store Connect API private key (.p8 contents)'
        required: false
      # Android signing and store credentials
      ANDROID_KEYSTORE:
        description: 'Base64-encoded Android upload keystore'
        required: false
      ANDROID_KEY_PROPERTIES:
        description: 'Contents of android/key.properties'
        required: false
      GOOGLE_PLAY_JSON_KEY:
        description: 'Google Play service account JSON key contents'
        required: false

concurrency:
  group: deploy-${{ inputs.platform }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Reject invalid lane × environment combinations
        env:
          LANE: ${{ inputs.lane }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$LANE" = "release" ] && [ "$ENVIRONMENT" != "production" ]; then
            echo "::error::lane=release only supports environment=production (release lanes always build the production config and upload to the store production track). For TestFlight / Play internal testing of the staging config, use lane=beta + environment=staging."
            exit 1
          fi

  ios:
    needs: validate
    name: Deploy iOS (${{ inputs.lane }})
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ios

      - name: Provision config
        working-directory: .
        run: ./scripts/setup.sh

      - name: Apply config from secret
        working-directory: .
        env:
          CONFIG_STAGING: ${{ secrets.CONFIG_STAGING }}
          CONFIG_PRODUCTION: ${{ secrets.CONFIG_PRODUCTION }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          var="CONFIG_$(printf '%s' "$ENV_NAME" | tr '[:lower:]' '[:upper:]')"
          config_json="${!var:-}"
          if [ -z "$config_json" ]; then
            echo "No $var secret set — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$config_json" | jq empty 2>/dev/null; then
            echo "::error::$var secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$config_json" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from $var secret"

      - name: Install Flutter dependencies
        working-directory: .
        run: flutter pub get

      - name: Preflight check
        env:
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
          APPLE_ID: ${{ vars.APPLE_ID }}
          TEAM_ID: ${{ vars.TEAM_ID }}
          ITC_TEAM_ID: ${{ vars.ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: bundle exec fastlane preflight environment:${{ inputs.environment }}

      - name: Deploy to ${{ inputs.environment }}
        env:
          # match
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          # App Store Connect API key
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          # App identifiers
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
          APPLE_ID: ${{ vars.APPLE_ID }}
          TEAM_ID: ${{ vars.TEAM_ID }}
          ITC_TEAM_ID: ${{ vars.ITC_TEAM_ID }}
        run: |
          bundle exec fastlane ${{ inputs.lane }} \
            environment:${{ inputs.environment }} \
            build_number:${{ github.run_number }}

  android:
    needs: validate
    name: Deploy Android (${{ inputs.lane }})
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: android

      - name: Provision config
        working-directory: .
        run: ./scripts/setup.sh

      - name: Apply config from secret
        working-directory: .
        env:
          CONFIG_STAGING: ${{ secrets.CONFIG_STAGING }}
          CONFIG_PRODUCTION: ${{ secrets.CONFIG_PRODUCTION }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          var="CONFIG_$(printf '%s' "$ENV_NAME" | tr '[:lower:]' '[:upper:]')"
          config_json="${!var:-}"
          if [ -z "$config_json" ]; then
            echo "No $var secret set — using committed config/examples/$ENV_NAME.json"
            exit 0
          fi
          if ! printf '%s' "$config_json" | jq empty 2>/dev/null; then
            echo "::error::$var secret is not valid JSON"
            exit 1
          fi
          printf '%s' "$config_json" > "config/$ENV_NAME.json"
          echo "Wrote config/$ENV_NAME.json from $var secret"

      - name: Decode Android keystore
        run: |
          mkdir -p keystore
          echo "$ANDROID_KEYSTORE" | base64 -d > keystore/upload.jks
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}

      - name: Write key.properties
        run: echo "$ANDROID_KEY_PROPERTIES" > key.properties
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}

      - name: Write Google Play service account key
        run: echo "$GOOGLE_PLAY_JSON_KEY" > fastlane/google-play-key.json
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

      - name: Install Flutter dependencies
        working-directory: .
        run: flutter pub get

      - name: Preflight check
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_PLAY_JSON_KEY: ./fastlane/google-play-key.json
        run: bundle exec fastlane preflight environment:${{ inputs.environment }}

      - name: Deploy to ${{ inputs.environment }}
        env:
          PACKAGE_NAME: ${{ vars.PACKAGE_NAME }}
          GOOGLE_PLAY_JSON_KEY: ./fastlane/google-play-key.json
        run: |
          bundle exec fastlane ${{ inputs.lane }} \
            environment:${{ inputs.environment }} \
            build_number:${{ github.run_number }}
