name: repository
description: Scaffold a REST repository for a project with dio_rest installed.
version: 0.1.0
vars:
  feature_name:
    type: string
    description: The feature this repository belongs to
    prompt: What feature does this repository belong to?
  entity_name:
    type: string
    description: The entity name (e.g., "order", "product")
    prompt: What is the entity name?
