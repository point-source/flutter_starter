name: feature
description: Scaffold a new feature with data, domain, and UI layers.
version: 0.2.0
vars:
  feature_name:
    type: string
    description: The name of the feature (e.g., "order", "notification")
    prompt: What is the feature name?
  dio:
    type: boolean
    description: Include REST data layer (requires the dio_rest capability)
    default: false
    prompt: Include opted-in REST data layer?
