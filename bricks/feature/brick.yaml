name: feature
description: Scaffold a new feature with data, domain, and UI layers.
version: 0.2.0
vars:
  feature_name:
    type: string
    description: The name of the feature (e.g., "order", "notification")
    prompt: What is the feature name?
  dio:
    type: boolean
    description: Include Dio/Retrofit data layer (service, DTO, mapper, Dio repository)
    default: false
    prompt: Include Dio/Retrofit data layer?
